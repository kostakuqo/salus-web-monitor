<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <!-- Meta refresh: redirecționează după 0 secunde -->
  <meta http-equiv="refresh" content="0; url=/salus-web-monitor/">
  <script>
    // JavaScript fallback în caz că meta refresh nu funcționează
    window.location.href = "/salus-web-monitor/";
  </script>
</head>
<body>
  <p>Dacă nu ești redirecționat automat, <a href="/salus-web-monitor/">click aici</a>.</p>
</body>
</html>
